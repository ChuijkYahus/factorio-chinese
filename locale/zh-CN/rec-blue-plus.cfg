[virtual-signal-description]
rbp-book-layer1=指定使用蓝图簿内对应槽位处的蓝图。
rbp-book-layer2=指定使用蓝图簿中蓝图簿内对应槽位处的蓝图。
rbp-book-layer3=指定使用蓝图簿下蓝图簿中蓝图簿内对应槽位处的蓝图（应该还好理解吧）。
rbp-book-layer4=第四层嵌套蓝图簿内选用的槽位号。
rbp-book-layer5=第五层嵌套蓝图簿内选用的槽位号。
rbp-book-layer6=第六层嵌套蓝图簿内选用的槽位号。如果你主动用到了这个信号，那你就是递归蓝图系统的递归大师了！
rbp-command=蓝图自动部署箱（BAD箱）的命令信号。各命令的描述见提示与技巧。
rbp-cancel=使用红图（拆除规划）和绿图（升级规划）时取消拆除和升级。
rbp-enviroment=使用参数拆除（命令11）时设置“仅树木和岩石”筛选器。
rbp-invert-filter=在参数拆除中使用黑名单。
rbp-rotate-bp=部署蓝图时进行旋转。（1 -> 顺时针90°，2 -> 180°，3 -> 逆时针90°）
rbp-superforce=部署蓝图或进行拆除时使用超级强制模式。
rbp-quality=在参数拆除（命令11）中使用“任何品质”筛选器。
rbp-center=接收到的“X”“Y”信号解析为区域中心而非角落。
rbp-absolute=接收到的“X”“Y”信号解析为绝对坐标而非偏移量。
rbp-wait=持续收到信号时不立刻重复执行。详情见提示与技巧。
rbp-library=指定在地图蓝图库中选用的槽位号。

